<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 400px; padding: 16px; font-family: system-ui; font-size: 14px; }
    h2 { margin-top: 0; }
    #status { white-space: pre-wrap; max-height: 300px; overflow-y: auto; font-size: 12px; background: #f5f5f5; padding: 8px; border-radius: 4px; }
    button { padding: 8px 16px; font-size: 14px; cursor: pointer; margin-right: 8px; }
    #run { background: #4CAF50; color: white; border: none; border-radius: 4px; }
    #run:disabled { background: #ccc; }
    #restore { background: #f44336; color: white; border: none; border-radius: 4px; }
  </style>
</head>
<body>
  <h2>Bookmark Organizer</h2>
  <p>This will organize your 181 flat bookmarks into 16 folders.</p>
  <button id="run">Organize Now</button>
  <button id="restore" style="display:none">Undo</button>
  <div id="status"></div>
  <script src="organizer.js"></script>
</body>
</html>
